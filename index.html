<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portal Atendimento</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#002D32;
  color:white;
}

/* LOGIN COM IMAGEM */
.login-container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  text-align:center;
  background-image:url('https://images.unsplash.com/photo-1556761175-4b46a572b786?q=80&w=1600&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  position:relative;
}

.login-container::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,45,50,0.8);
}

.login-box{
  position:relative;
  z-index:2;
  background:rgba(0,90,100,0.85);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(6px);
}

.login-box h1{
  margin:0;
  font-size:32px;
}

.login-box h2{
  margin:10px 0 20px 0;
  font-weight:normal;
  color:#4CDDDD;
}

.login-btn{
  padding:12px 25px;
  background:#4CDDDD;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.logout-btn{
  padding:8px 15px;
  background:#FFCE00;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  color:#002D32;
}

/* HEADER */
header{
  background:#005A64;
  padding:15px 20px;
}

header .menu-container{
  max-width:1000px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header .menu-container h1{
  font-size:20px;
  margin:0;
}

header nav ul{
  list-style:none;
  display:flex;
  gap:15px;
  margin:0;
  padding:0;
  align-items:center;
}

header nav ul li a{
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

.container{
  padding:30px;
  max-width:1000px;
  margin:0 auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#005A64;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.button{
  display:block;
  background:#4CDDDD;
  color:#002D32;
  padding:12px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  margin-top:10px;
}

#conteudo{
  display:none;
}

/* LOGO FIXO */
.logo-fixo{
  position:fixed;
  bottom:20px;
  left:20px;
  width:110px;
  opacity:0.9;
  z-index:1000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-area" class="login-container">
  <div class="login-box">
    <h1>CX Resolve</h1>
    <h2>Portal Oficial do Time de Atendimento</h2>
    <p>Use seu e-mail corporativo Leveros</p>
    <button class="login-btn" id="loginBtn">Entrar com Google</button>
  </div>
</div>

<!-- PORTAL -->
<div id="conteudo">
<header>
  <div class="menu-container">
    <h1>Portal - Time de Atendimento</h1>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="materiais.html">Materiais</a></li>
        <li><a href="informativos.html">Informativos</a></li>
        <li><button class="logout-btn" id="logoutBtn">Sair</button></li>
      </ul>
    </nav>
  </div>
</header>

<div class="container">
  <h2>Acessos Rápidos</h2>

  <div class="grid">
    <div class="card"><h3>GLPI</h3><a href="https://glpi.leveros.com.br" class="button">Acessar</a></div>
    <div class="card"><h3>Uappi</h3><a href="https://www.vendas.leveros.com.br" class="button">Acessar</a></div>
    <div class="card"><h3>BoxLink</h3><a href="https://matriz.boxlink.com.br/home" class="button">Acessar</a></div>
    <div class="card"><h3>Intergrall</h3><a href="https://wwws.intergrall.com.br/callcenter/cc_login.php" class="button">Acessar</a></div>
    <div class="card"><h3>Assertiva</h3><a href="https://painel.assertivasolucoes.com.br/login" class="button">Acessar</a></div>
    <div class="card"><h3>Senior</h3><a href="https://platform.senior.com.br/senior-x/#/" class="button">Acessar</a></div>
  </div>
</div>
</div>

<!-- LOGO -->
<img src="AF_MARCA_RGB_NEGATIVA-01.png" alt="Logo Leveros" class="logo-fixo">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSyA6WjOoM-KCi-Yl4E5rwKbOulF8tBYEClo",
  authDomain:"portal-atendimento-541ae.firebaseapp.com",
  projectId:"portal-atendimento-541ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* VERIFICA LOGIN */
onAuthStateChanged(auth,user=>{
  if(user && user.email.endsWith("@leveros.com.br")){
    document.getElementById("login-area").style.display="none";
    document.getElementById("conteudo").style.display="block";
  } else {
    document.getElementById("login-area").style.display="flex";
    document.getElementById("conteudo").style.display="none";
  }
});

/* BOTÃO LOGIN */
document.getElementById("loginBtn").addEventListener("click",async()=>{
  const result = await signInWithPopup(auth,provider);
  const email = result.user.email;
  if(!email.endsWith("@leveros.com.br")){
    alert("Acesso permitido apenas para e-mails corporativos.");
    signOut(auth);
  }
});

/* BOTÃO SAIR */
document.getElementById("logoutBtn").addEventListener("click",async()=>{
  await signOut(auth);
});
</script>

</body>
</html>
