<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CX Resolve – Portal de Atendimento</title>

<style>
/* (SEU CSS NÃO FOI ALTERADO – mantive exatamente igual) */
:root {
  --verde1: #002D32;
  --verde2: #005A64;
  --azul: #4CDDDD;
  --verde3: #6FFFAF;
  --amarelo:#FFCE00;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.09);
  --font: Verdana, Geneva, Tahoma, sans-serif;
}

/* ... (mantive todo seu CSS igual, pode deixar como está) */
</style>
</head>

<body>

<div class="bg-layer"></div>

<!-- LOGIN -->
<div id="login-area">
  <div class="login-card">
    <img src="AF_MARCA_RGB_NEGATIVA-01.png" class="login-logo">
    <h2>CX Resolve</h2>
    <p>Portal interno do time de atendimento</p>

    <button class="login-btn" id="loginBtn">
      Entrar com Google
    </button>
  </div>
</div>

<!-- CONTEÚDO -->
<div id="conteudo">

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <img src="AF_MARCA_RGB_NEGATIVA-01.png" class="header-logo">

      <nav>
        <ul>
          <li><a href="index.html" class="active">Início</a></li>
          <li><a href="materiais.html">Materiais</a></li>
          <li><a href="informativos.html">Informativos</a></li>
          <li><button class="logout-btn" id="logoutBtn">Sair</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="container">

    <!-- WELCOME -->
    <h1>Olá, <span id="welcomeUser">bem-vindo</span></h1>
    <p id="welcomeDate"></p>

    <!-- MURAL -->
    <h2>Mural de Avisos</h2>

    <button onclick="toggleFormAviso()">Publicar aviso</button>

    <div id="formAviso" style="display:none;">
      <textarea id="textoAviso"></textarea>

      <select id="catAviso">
        <option value="informativo">Informativo</option>
        <option value="urgente">Urgente</option>
        <option value="treinamento">Treinamento</option>
        <option value="geral">Geral</option>
      </select>

      <button onclick="publicarAviso()">Publicar</button>
    </div>

    <div id="avisosLista"></div>

  </div>
</div>

<script>

/* DATA */
const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

const agora = new Date();

document.getElementById('welcomeDate').textContent =
`${dias[agora.getDay()]}, ${agora.getDate()} de ${meses[agora.getMonth()]} de ${agora.getFullYear()}`;


/* FORM */
function toggleFormAviso(){
  const form = document.getElementById('formAviso');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}


/* EMOJIS */
const EMOJIS = {
  urgente:'🚨',
  informativo:'📋',
  treinamento:'📚',
  geral:'📌'
};


/* SEGURANÇA */
function escapeHTML(str){
  return str.replace(/[&<>"']/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  })[m]);
}


/* RENDER */
function renderAvisos(avisos){

  const lista = document.getElementById('avisosLista');

  if(!avisos.length){
    lista.innerHTML = 'Nenhum aviso';
    return;
  }

  lista.innerHTML = avisos.map(a => {

    return `
      <div class="aviso-card ${a.categoria}">
        
        <div class="aviso-body">
          
          <div class="aviso-meta">
            <span>${EMOJIS[a.categoria]}</span>
            <span>${a.autor || ''}</span>
          </div>

          <!-- AQUI TAVA FALTANDO -->
          <div class="aviso-texto">
            ${escapeHTML(a.texto)}
          </div>

        </div>

      </div>
    `;

  }).join('');
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore, collection, addDoc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey:"SUA_KEY",
  authDomain:"SEU_DOMINIO",
  projectId:"SEU_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();


function carregarAvisos(){
  const q = query(collection(db, 'avisos'), orderBy('criadoEm','desc'));

  onSnapshot(q, snap => {
    const avisos = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderAvisos(avisos);
  });
}


window.publicarAviso = async function(){

  const texto = document.getElementById('textoAviso').value.trim();
  const cat = document.getElementById('catAviso').value;

  if(!texto) return;

  await addDoc(collection(db, 'avisos'), {
    texto,
    categoria: cat,
    autor: auth.currentUser?.displayName || 'Usuário',
    criadoEm: serverTimestamp()
  });

  document.getElementById('textoAviso').value = '';
};


onAuthStateChanged(auth, user => {

  if(user){

    document.getElementById('login-area').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';

    document.getElementById('welcomeUser').textContent =
      user.displayName || 'Usuário';

    carregarAvisos();

  } else {

    document.getElementById('login-area').style.display = 'block';
    document.getElementById('conteudo').style.display = 'none';

  }

});


document.getElementById('loginBtn').onclick =
  () => signInWithPopup(auth, provider);

document.getElementById('logoutBtn').onclick =
  () => signOut(auth);

</script>

</body>
</html>
