<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal Atendimento</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #002D32;
    color: white;
}

/* LOGIN */
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

.login-btn {
    padding: 12px 25px;
    background-color: #4CDDDD;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

/* PORTAL */
header {
    background-color: #005A64;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background-color: #005A64;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.button {
    display: block;
    background-color: #4CDDDD;
    color: #002D32;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 10px;
}

.alert {
    background-color: #FFCE00;
    color: #002D32;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 25px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-area" class="login-container">
    <h2>Login Corporativo</h2>
    <p>Use seu e-mail da empresa</p>
    <button class="login-btn" id="loginBtn">Entrar com Google</button>
</div>

<!-- PORTAL -->
<div id="conteudo" style="display:none;">

<header>
Portal Oficial - Time de Atendimento
</header>

<div class="container">

<div class="alert">
📢 Comunicado: Novo fluxo de Pedido Não Faturado ativo!
</div>

<h2>Acessos Rápidos</h2>

<div class="grid">

<div class="card">
<h3>GLPI</h3>
<a href="https://glpi.leveros.com.br" class="button">Acessar</a>
</div>

<div class="card">
<h3>Uappi</h3>
<a href="https://www.vendas.leveros.com.br" class="button">Acessar</a>
</div>

<div class="card">
<h3>BoxLink</h3>
<a href="https://matriz.boxlink.com.br/home" class="button">Acessar</a>
</div>

<div class="card">
<h3>Intergrall</h3>
<a href="https://wwws.intergrall.com.br/callcenter/cc_login.php" class="button">Acessar</a>
</div>

</div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6WjOoM-KCi-Yl4E5rwKbOulF8tBYEClo",
  authDomain: "portal-atendimento-541ae.firebaseapp.com",
  projectId: "portal-atendimento-541ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").addEventListener("click", async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    const email = result.user.email;

    if (email.endsWith("@leveros.com.br")) {
      document.getElementById("login-area").style.display = "none";
      document.getElementById("conteudo").style.display = "block";
    } else {
      alert("Acesso permitido apenas para e-mails corporativos.");
    }

  } catch (error) {
    alert("Erro: " + error.message);
    console.error(error);
  }
});
</script>

</body>
</html>
