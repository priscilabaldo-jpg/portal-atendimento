<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CX Resolve – Portal de Atendimento</title>

  <style>
    :root {
      --verde1: #002D32;
      --verde2: #005A64;
      --azul: #4CDDDD;
      --verde3: #6FFFAF;
      --amarelo: #FFCE00;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.09);
      --font: Verdana, Geneva, Tahoma, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--verde1);
      color: white;
      min-height: 100vh;
      font-size: 13px;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(76, 221, 221, 0.08), transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(111, 255, 175, 0.06), transparent 60%),
        linear-gradient(160deg, #002D32, #004A52, #002D32);
    }

    /* LOGIN */
    #login-area {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-card {
      background: rgba(0, 80, 90, 0.3);
      border: 1px solid var(--glass-border);
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      max-width: 350px;
      width: 100%;
    }

    .login-logo {
      width: 140px;
      margin-bottom: 20px;
      filter: brightness(0) invert(1);
    }

    .login-btn {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      border: none;
      background: var(--azul);
      color: var(--verde1);
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    /* HEADER */
    header {
      background: rgba(0, 40, 46, 0.9);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin-right: 10px;
      text-decoration: none;
    }

    .logout-btn {
      border: 1px solid var(--amarelo);
      background: transparent;
      color: var(--amarelo);
      padding: 5px 10px;
      cursor: pointer;
    }

    .container {
      padding: 30px;
    }

    .section-label {
      margin: 20px 0 10px;
      color: var(--azul);
      font-size: 12px;
      text-transform: uppercase;
    }

    /* SISTEMAS */
    .sistema-card {
      background: var(--glass);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .sistema-btn {
      background: var(--azul);
      color: var(--verde1);
      padding: 5px 10px;
      border-radius: 5px;
      text-decoration: none;
    }

    /* MURAL */
    .form-aviso textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: white;
    }

    .btn-publicar {
      background: var(--azul);
      border: none;
      padding: 8px 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .aviso-card {
      background: var(--glass);
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

  </style>
</head>

<body>

  <div class="bg-layer"></div>

  <!-- LOGIN -->
  <div id="login-area">
    <div class="login-card">
      <img src="AF_MARCA_RGB_NEGATIVA-01.png" class="login-logo">
      <h2>CX Resolve</h2>
      <p>Portal interno do time</p>
      <button class="login-btn" id="loginBtn">Entrar com Google</button>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div id="conteudo" style="display:none;">

    <header>
      <div>CX Resolve</div>
      <nav>
        <a href="#">Início</a>
        <a href="#">Materiais</a>
        <a href="#">Informativos</a>
        <button class="logout-btn" id="logoutBtn">Sair</button>
      </nav>
    </header>

    <div class="container">

      <h2>Olá, <span id="welcomeUser"></span></h2>
      <p id="welcomeDate"></p>

      <!-- MURAL -->
      <p class="section-label">Mural</p>

      <div class="form-aviso">
        <textarea id="textoAviso" placeholder="Digite um aviso"></textarea>
        <button class="btn-publicar" onclick="publicarAviso()">Publicar</button>
      </div>

      <div id="avisosLista"></div>

      <!-- SISTEMAS -->
      <p class="section-label">Sistemas</p>

      <div class="sistema-card">
        <span>GLPI</span>
        <a class="sistema-btn" href="https://glpi.leveros.com.br" target="_blank">Abrir</a>
      </div>

    </div>

  </div>

  <script>
    const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

    const agora = new Date();

    document.getElementById('welcomeDate').textContent =
      `${dias[agora.getDay()]}, ${agora.getDate()} de ${meses[agora.getMonth()]} de ${agora.getFullYear()}`;

    function renderAvisos(lista) {
      const el = document.getElementById('avisosLista');
      el.innerHTML = lista.map(a => `
        <div class="aviso-card">
          ${a.texto}
        </div>
      `).join('');
    }
  </script>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "SUA_KEY",
      authDomain: "SEU_DOMINIO",
      projectId: "SEU_ID"
    });

    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('conteudo').style.display = 'block';
        document.getElementById('welcomeUser').textContent = user.displayName.split(' ')[0];

        onSnapshot(collection(db, 'avisos'), snap => {
          const lista = snap.docs.map(d => d.data());
          renderAvisos(lista);
        });

      } else {
        document.getElementById('login-area').style.display = 'flex';
        document.getElementById('conteudo').style.display = 'none';
      }
    });

    window.publicarAviso = async function () {
      const texto = document.getElementById('textoAviso').value;
      if (!texto) return;

      await addDoc(collection(db, 'avisos'), { texto });
      document.getElementById('textoAviso').value = '';
    };
  </script>

</body>
</html>
