<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portal Atendimento - CX Resolve</title>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(135deg,#002D32,#004D54,#00383E);
color:white;
}

/* LOGIN */

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}

.login-box{
background:rgba(255,255,255,0.08);
padding:50px;
border-radius:25px;
backdrop-filter:blur(15px);
}

.login-btn{
margin-top:20px;
padding:14px 35px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#4CDDDD,#2bbbbb);
font-weight:bold;
cursor:pointer;
}

/* HEADER */

header{
background:rgba(0,90,100,0.85);
padding:18px 25px;
}

.menu-container{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
}

.logout-btn{
padding:8px 18px;
border:none;
border-radius:20px;
background:#FFCE00;
font-weight:bold;
cursor:pointer;
color:#002D32;
}

/* CONTAINER */

.container{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

/* BUSCA */

.search-box{
margin:20px 0;
position:relative;
}

.search-box input{
width:100%;
max-width:450px;
padding:14px;
border-radius:30px;
border:none;
font-size:15px;
background:rgba(255,255,255,0.15);
color:white;
}

.resultados{
position:absolute;
top:50px;
width:100%;
max-width:450px;
background:#002D32;
border-radius:10px;
display:none;
}

.resultado{
padding:10px 15px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.resultado a{
color:white;
text-decoration:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.08);
padding:35px;
border-radius:25px;
text-align:center;
}

.button{
background:linear-gradient(135deg,#4CDDDD,#2bbbbb);
color:#002D32;
padding:10px 25px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* BANNER */

.banner{
background:#4CDDDD;
color:#002D32;
padding:15px;
border-radius:10px;
margin-top:20px;
text-align:center;
font-weight:bold;
}

.recado{display:none;}
.recado.active{display:block;}

#conteudo{display:none;}

</style>
</head>

<body>

<div id="login-area" class="login-container">

<div class="login-box">

<h1>CX Resolve</h1>
<p>Portal do Atendimento</p>

<button class="login-btn" id="loginBtn">
Entrar com Google
</button>

</div>
</div>

<div id="conteudo">

<header>

<div class="menu-container">

<h2>Portal Atendimento</h2>

<nav>
<ul>
<li><a href="index.html">Início</a></li>
<li><a href="materiais.html">Materiais</a></li>
<li><a href="informativos.html">Informativos</a></li>
<li><button class="logout-btn" id="logoutBtn">Sair</button></li>
</ul>
</nav>

</div>

</header>

<div class="container">

<h2>Acessos rápidos</h2>

<div id="welcomeUser"></div>

<div class="search-box">

<input type="text" id="busca" placeholder="Buscar sistema ou material">

<div id="resultados" class="resultados"></div>

</div>

<div class="banner">

<div class="recado active">Treinamento CX 09/03</div>
<div class="recado">Atualização de metas disponível</div>
<div class="recado">Pesquisa de satisfação do time</div>

</div>

<div class="grid">

<div class="card">
<h3>GLPI</h3>
<a class="button" href="https://glpi.leveros.com.br">Acessar</a>
</div>

<div class="card">
<h3>Uappi</h3>
<a class="button" href="https://www.vendas.leveros.com.br">Acessar</a>
</div>

<div class="card">
<h3>BoxLink</h3>
<a class="button" href="https://matriz.boxlink.com.br/home">Acessar</a>
</div>

<div class="card">
<h3>Intergrall</h3>
<a class="button" href="https://wwws.intergrall.com.br/callcenter/cc_login.php">Acessar</a>
</div>

</div>

</div>

</div>

<script>

/* DADOS DA BUSCA */

const dados=[

{nome:"GLPI",link:"https://glpi.leveros.com.br"},
{nome:"Uappi",link:"https://www.vendas.leveros.com.br"},
{nome:"BoxLink",link:"https://matriz.boxlink.com.br/home"},
{nome:"Intergrall",link:"https://wwws.intergrall.com.br/callcenter/cc_login.php"},
{nome:"Materiais de Treinamento",link:"materiais.html"},
{nome:"Informativos do Atendimento",link:"informativos.html"}

];

/* BUSCA */

document.getElementById("busca").addEventListener("keyup",function(){

let texto=this.value.toLowerCase();

let resultados=document.getElementById("resultados");

resultados.innerHTML="";

if(texto.length<2){

resultados.style.display="none";
return;

}

let encontrados=dados.filter(item=>item.nome.toLowerCase().includes(texto));

encontrados.forEach(item=>{

resultados.innerHTML+=
`<div class="resultado"><a href="${item.link}">${item.nome}</a></div>`;

});

resultados.style.display="block";

});

/* BANNER */

const recados=document.querySelectorAll(".recado");

let i=0;

setInterval(()=>{

recados[i].classList.remove("active");

i=(i+1)%recados.length;

recados[i].classList.add("active");

},4000);

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyA6WjOoM-KCi-Yl4E5rwKbOulF8tBYEClo",

authDomain:"portal-atendimento-541ae.firebaseapp.com",

projectId:"portal-atendimento-541ae"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const provider=new GoogleAuthProvider();

onAuthStateChanged(auth,user=>{

if(user && user.email.endsWith("@leveros.com.br")){

document.getElementById("login-area").style.display="none";

document.getElementById("conteudo").style.display="block";

document.getElementById("welcomeUser").innerHTML=
"Olá "+user.displayName;

}else{

document.getElementById("login-area").style.display="flex";

document.getElementById("conteudo").style.display="none";

}

});

document.getElementById("loginBtn").onclick=()=>{

signInWithPopup(auth,provider);

};

document.getElementById("logoutBtn").onclick=()=>{

signOut(auth);

};

</script>

</body>
</html>
