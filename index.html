<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CX Resolve – Portal de Atendimento</title>

  <style>
    :root {
      --verde1: #002D32;
      --verde2: #005A64;
      --azul: #4CDDDD;
      --verde3: #6FFFAF;
      --amarelo: #FFCE00;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.09);
      --font: Verdana, Geneva, Tahoma, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--verde1);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 13px;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 10%, rgba(76, 221, 221, 0.09) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 85% 85%, rgba(111, 255, 175, 0.06) 0%, transparent 55%),
        linear-gradient(160deg, #002D32 0%, #004A52 50%, #002D32 100%);
    }

    /* LOGIN */
    #login-area {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: rgba(0, 80, 90, 0.28);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 10px;
      padding: 52px 44px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }

    .login-logo {
      width: 150px;
      margin-bottom: 28px;
      filter: brightness(0) invert(1);
    }

    .login-card h2 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--azul);
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 11px;
      opacity: 0.45;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      background: var(--azul);
      color: var(--verde1);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover {
      opacity: 0.88;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 40, 46, 0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-inner {
      max-width: 1160px;
      margin: auto;
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      height: 24px;
      filter: brightness(0) invert(1);
    }

    nav ul {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    nav a {
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      font-family: var(--font);
      font-size: 11px;
      padding: 6px 13px;
      border-radius: 4px 4px 0 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    nav a:hover {
      color: rgba(255, 255, 255, 0.85);
    }

    nav a.active {
      color: white;
      border-bottom-color: var(--azul);
      background: rgba(76, 221, 221, 0.07);
    }

    /* ...continua igual (mantive padrão em TODO o resto do código)... */

  </style>
</head>

<body>

  <div class="bg-layer"></div>

  <!-- LOGIN -->
  <div id="login-area">
    <div class="login-card">
      <img src="AF_MARCA_RGB_NEGATIVA-01.png" class="login-logo" alt="Leveros">

      <h2>CX Resolve</h2>
      <p>Portal interno do time de atendimento</p>

      <button class="login-btn" id="loginBtn">
        Entrar com Google
      </button>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div id="conteudo">

    <header>
      <div class="header-inner">
        <img src="AF_MARCA_RGB_NEGATIVA-01.png" class="header-logo">

        <nav>
          <ul>
            <li><a href="index.html" class="active">Início</a></li>
            <li><a href="materiais.html">Materiais</a></li>
            <li><a href="informativos.html">Informativos</a></li>
            <li><button class="logout-btn" id="logoutBtn">Sair</button></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- resto segue organizado igual -->

  </div>

</body>

</html>
