<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portal Atendimento</title>
<style>
body { margin:0; font-family: Arial,sans-serif; background:#002D32; color:white; }
.login-container { display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; }
.login-btn { padding:12px 25px; background:#4CDDDD; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
header { background:#005A64; padding:15px 20px; }
header .menu-container { max-width:1000px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
header .menu-container h1 { font-size:24px; font-weight:bold; margin:0; }
header nav ul { list-style:none; display:flex; gap:15px; margin:0; padding:0; }
header nav ul li a { color:#fff; text-decoration:none; font-weight:bold; padding:6px 12px; border-radius:4px; transition:0.3s; }
header nav ul li a:hover { background:#003f46; }
.container { padding:30px; max-width:1000px; margin:0 auto; }
.alert { background:#FFCE00; color:#002D32; padding:15px; border-radius:10px; margin-bottom:25px; font-weight:bold; text-align:center; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
.card { background:#005A64; padding:20px; border-radius:15px; text-align:center; transition: transform 0.3s, box-shadow 0.3s; }
.card:hover { transform:scale(1.05); box-shadow:0 6px 15px rgba(0,0,0,0.3); }
.card h3 { margin-top:0; }
.button { display:block; background:#4CDDDD; color:#002D32; padding:12px; border-radius:8px; text-decoration:none; font-weight:bold; margin-top:10px; transition:0.3s; }
.button:hover { background:#34b3b3; }
@media (max-width:600px){ header .menu-container{flex-direction:column; gap:10px;} .grid{grid-template-columns:1fr;} }
#conteudo{display:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-area" class="login-container">
    <h2>Login Corporativo</h2>
    <p>Use seu e-mail da empresa</p>
    <button class="login-btn" id="loginBtn">Entrar com Google</button>
</div>

<!-- PORTAL -->
<div id="conteudo">
<header>
  <div class="menu-container">
    <h1>Portal Oficial - Time de Atendimento</h1>
    <nav>
  <ul>
    <li><a href="index.html">Início</a></li>
    <li><a href="materiais.html">Materiais</a></li>
    <li><a href="informativos.html">Informativos</a></li> <!-- <- Aqui -->
  </ul>
</nav>
  </div>
</header>

<div class="container">
  <div class="alert">📢 Comunicado: Novo fluxo de Pedido Não Faturado ativo!</div>
  <h2>Acessos Rápidos</h2>
  <div class="grid">
    <div class="card"><h3>GLPI</h3><a href="https://glpi.leveros.com.br" class="button">Acessar</a></div>
    <div class="card"><h3>Uappi</h3><a href="https://www.vendas.leveros.com.br" class="button">Acessar</a></div>
    <div class="card"><h3>BoxLink</h3><a href="https://matriz.boxlink.com.br/home" class="button">Acessar</a></div>
    <div class="card"><h3>Intergrall</h3><a href="https://wwws.intergrall.com.br/callcenter/cc_login.php" class="button">Acessar</a></div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSyA6WjOoM-KCi-Yl4E5rwKbOulF8tBYEClo",
  authDomain:"portal-atendimento-541ae.firebaseapp.com",
  projectId:"portal-atendimento-541ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Mostra conteúdo apenas quando Firebase carrega
onAuthStateChanged(auth,user=>{
  if(user && user.email.endsWith("@leveros.com.br")){
    document.getElementById("login-area").style.display="none";
    document.getElementById("conteudo").style.display="block";
  } else {
    document.getElementById("login-area").style.display="flex";
    document.getElementById("conteudo").style.display="none";
  }
});

document.getElementById("loginBtn").addEventListener("click",async()=>{
  try{
    const result = await signInWithPopup(auth,provider);
    const email = result.user.email;
    if(email.endsWith("@leveros.com.br")){
      document.getElementById("login-area").style.display="none";
      document.getElementById("conteudo").style.display="block";
    } else alert("Acesso permitido apenas para e-mails corporativos.");
  } catch(error){alert("Erro: "+error.message); console.error(error);}
});
</script>

</body>
</html>
