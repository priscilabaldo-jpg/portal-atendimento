<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal Atendimento</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #002D32;
    color: white;
}

header {
    background-color: #005A64;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background-color: #005A64;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.button {
    display: block;
    background-color: #4CDDDD;
    color: #002D32;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 10px;
}

.alert {
    background-color: #FFCE00;
    color: #002D32;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 25px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
Portal Oficial - Time de Atendimento
</header>

<div class="container">

<div class="alert">
📢 Comunicado: Novo fluxo de Pedido Não Faturado ativo!
</div>

<h2>Acessos Rápidos</h2>

<div class="grid">

<div class="card">
<h3>GLPI</h3>
<a href="https://glpi.leveros.com.br/index.php?redirect=%2Ffront%2Fcentral.php&error=3" class="button">Acessar</a>
</div>

<div class="card">
<h3>Uappi</h3>
<a href="https://www.vendas.leveros.com.br/wapstore/pedido/?limpar-ordenacao=busca&tipoBusca=numeroPedido&limpar-ordenacao=busca&busca=LVI-1333" class="button">Acessar</a>
</div>

<div class="card">
<h3>BoxLink</h3>
<a href="https://matriz.boxlink.com.br/home" class="button">Acessar</a>
</div>

<div class="card">
<h3>Intergrall</h3>
<a href="https://wwws.intergrall.com.br/callcenter/cc_login.php" class="button">Acessar</a>
</div>

</div>

</div>

</body>
</html>
</html>
