<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CX Resolve – Portal de Atendimento</title>

<style>
/* (SEU CSS CONTINUA IGUAL — NÃO MUDEI NADA AQUI) */
</style>
</head>

<body>

<div class="bg-layer"></div>

<!-- LOGIN -->
<div id="login-area">
  <div class="login-card">
    <img src="AF_MARCA_RGB_NEGATIVA-01.png" class="login-logo">
    <h2>CX Resolve</h2>
    <p>Portal interno do time de atendimento</p>
    <button class="login-btn" id="loginBtn">Entrar com Google</button>
  </div>
</div>

<!-- CONTEÚDO -->
<div id="conteudo">

  <!-- MURAL -->
  <div class="container">

    <div class="mural-header">
      <p class="section-label">📢 Mural de Avisos</p>
      <button class="btn-admin" id="btnAdmin" style="display:none" onclick="toggleFormAviso()">
        ✏️ Publicar aviso
      </button>
    </div>

    <div class="form-aviso" id="formAviso">
      <textarea id="textoAviso" rows="3" placeholder="Digite o aviso…"></textarea>
      <div class="form-aviso-row">
        <select class="cat-select" id="catAviso">
          <option value="informativo">Informativo</option>
          <option value="urgente">Urgente</option>
          <option value="treinamento">Treinamento</option>
          <option value="geral">Geral</option>
        </select>
        <button class="btn-publicar" onclick="publicarAviso()">Publicar</button>
      </div>
    </div>

    <div class="avisos-lista" id="avisosLista"></div>

  </div>

</div>

<script>
const EMOJIS = { urgente:'🚨', informativo:'📋', treinamento:'📚', geral:'📌' };

function escapeHTML(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    })[m];
  });
}

/* ✅ CORRIGIDO AQUI */
function renderAvisos(avisos) {
  const lista = document.getElementById('avisosLista');

  if (!avisos.length) {
    lista.innerHTML = '<div class="avisos-vazio">Nenhum aviso publicado.</div>';
    return;
  }

  lista.innerHTML = avisos.map(a => {
    const data = a.criadoEm
      ? new Date(a.criadoEm.seconds * 1000).toLocaleDateString('pt-BR', {
          day:'2-digit',
          month:'short',
          hour:'2-digit',
          minute:'2-digit'
        })
      : '';

    const podeDeletar = window._userEmail === 'priscila.baldo@leveros.com.br';

    return `
      <div class="aviso-card ${a.categoria}">

        <div class="aviso-body">

          <div class="aviso-meta">
            <span class="aviso-badge ${a.categoria}">
              ${EMOJIS[a.categoria] || '📌'} ${a.categoria}
            </span>
            <span class="aviso-autor">${a.autor || ''}</span>
            <span class="aviso-data">${data}</span>
          </div>

          <!-- 🔥 TEXTO DO AVISO (ESSA PARTE RESOLVE SEU PROBLEMA) -->
          <div class="aviso-texto">
            ${escapeHTML(a.texto || '')}
          </div>

        </div>

        ${podeDeletar
          ? `<button class="btn-apagar" onclick="apagarAviso('${a.id}')">✕</button>`
          : ''
        }

      </div>
    `;
  }).join('');
}

function toggleFormAviso() {
  document.getElementById('formAviso').classList.toggle('open');
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, orderBy, query, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"SUA_KEY",
  authDomain:"SEU_DOMINIO",
  projectId:"SEU_PROJETO"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

const ADMIN = 'priscila.baldo@leveros.com.br';

function carregarAvisos() {
  const q = query(collection(db, 'avisos'), orderBy('criadoEm', 'desc'));
  onSnapshot(q, snap => {
    const avisos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAvisos(avisos);
  });
}

window.publicarAviso = async function() {
  const texto = document.getElementById('textoAviso').value.trim();
  const cat   = document.getElementById('catAviso').value;

  if (!texto) return;

  await addDoc(collection(db, 'avisos'), {
    texto,
    categoria: cat,
    autor: auth.currentUser?.displayName?.split(' ')[0] || 'Gestor',
    criadoEm: serverTimestamp()
  });

  document.getElementById('textoAviso').value = '';
};

window.apagarAviso = async function(id) {
  await deleteDoc(doc(db, 'avisos', id));
};

onAuthStateChanged(auth, user => {
  if (user) {
    window._userEmail = user.email;
    document.getElementById('login-area').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';

    if (user.email === ADMIN) {
      document.getElementById('btnAdmin').style.display = 'flex';
    }

    carregarAvisos();
  }
});

document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
</script>

</body>
</html>
