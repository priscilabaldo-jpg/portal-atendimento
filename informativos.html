<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Informativos - CX Resolve</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#002D32,#004D54,#00383E);
  color:white;
}

/* BOTÃO VOLTAR */

.botao-voltar{
position:fixed;
top:20px;
left:20px;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4CDDDD,#2bbbbb);
color:#002D32;
border-radius:50%;
font-size:20px;
font-weight:bold;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
z-index:999;
transition:0.3s;
}

.botao-voltar:hover{
transform:scale(1.1);
}

/* HEADER */

header{
  background:rgba(0,90,100,0.85);
  backdrop-filter:blur(10px);
  padding:18px 25px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.menu-container{
  max-width:1200px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu-container h1{font-size:20px;margin:0;}

nav ul{
  list-style:none;
  display:flex;
  gap:20px;
  margin:0;
  padding:0;
  align-items:center;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

nav a:hover{opacity:0.7;}

.logout-btn{
  padding:8px 18px;
  border:none;
  border-radius:20px;
  background:#FFCE00;
  font-weight:bold;
  cursor:pointer;
  color:#002D32;
}

/* CONTAINER */

.container{
  padding:60px 20px;
  max-width:1200px;
  margin:0 auto;
}

.section-title{
  font-size:22px;
  margin-bottom:30px;
  font-weight:bold;
}

/* GRID */

.informativos-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARDS */

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:25px;
  padding:25px;
  transition:all 0.4s ease;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.card h3{
  font-size:18px;
  margin-bottom:10px;
}

.meta-highlight{
  font-size:14px;
  color:#4CDDDD;
  margin-bottom:10px;
  font-weight:bold;
}

.details{
  display:none;
  font-size:13px;
  line-height:1.5;
  margin-top:10px;
  opacity:0.9;
}

.toggle-btn{
  margin-top:10px;
  background:linear-gradient(135deg,#4CDDDD,#2bbbbb);
  border:none;
  padding:8px 18px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
  color:#002D32;
  transition:0.3s;
}

.toggle-btn:hover{
  transform:scale(1.05);
}

/* FOOTER */

.footer-section{
  margin-top:80px;
  padding:50px 20px;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(10px);
}

.feedback-container{
  max-width:600px;
  margin:0 auto 40px auto;
  text-align:center;
}

.feedback-container input,
.feedback-container textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
}

.feedback-container button{
  background:linear-gradient(135deg,#4CDDDD,#2bbbbb);
  color:#002D32;
  border:none;
  padding:12px 25px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

.success-message{
  display:none;
  background:#1B8A5A;
  padding:12px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:14px;
}

.footer-bottom{
  text-align:center;
  font-size:13px;
  opacity:0.7;
}

.logo-fixo{
  position:fixed;
  bottom:25px;
  left:25px;
  width:110px;
  opacity:0.6;
}

#informativos-content{display:none;}

</style>
</head>

<body>

<a href="index.html" class="botao-voltar">⬅</a>

<div id="informativos-content">

<header>
  <div class="menu-container">
    <h1>Informativos</h1>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="materiais.html">Materiais</a></li>
        <li><a href="informativos.html">Informativos</a></li>
        <li><button class="logout-btn" id="logoutBtn">Sair</button></li>
      </ul>
    </nav>
  </div>
</header>
