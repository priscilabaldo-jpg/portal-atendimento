<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Materiais</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px;}
.back-link{display:inline-flex;align-items:center;color:#005A64;text-decoration:none;font-weight:bold;margin-bottom:20px;transition:color .3s;}
.back-link:hover{color:#003f46;}
.back-link svg{margin-right:8px;width:18px;height:18px;fill:currentColor;transition:transform .3s;}
.back-link:hover svg{transform:translateX(-3px);}
h1{color:#005A64;text-align:center;margin-bottom:30px;}
.materiais-container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.card{background:#fff;border-radius:12px;padding:20px;width:260px;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:transform .3s,box-shadow .3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.card h3{margin-top:0;color:#005A64;}
.card p{font-size:14px;color:#333;}
.card a{display:inline-block;margin-top:10px;text-decoration:none;color:#fff;background:#005A64;padding:10px 14px;border-radius:6px;font-weight:bold;transition:background .3s;}
.card a:hover{background:#003f46;}
#materiais-content{display:none;}
</style>
</head>
<body>

<div id="materiais-content">
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    Voltar para Acessos Rápidos
  </a>

  <h1>Materiais</h1>
  <div class="materiais-container">
    <div class="card"><h3>Book de Atendimento N1,N2,N3</h3><p>Guia rápido para consultas.</p><a href="https://drive.google.com/file/d/1xBUkqpieFy7grDgKH9m6N8qgLh5UNQYz/view?usp=sharing" target="_blank">Abrir Documento</a></div>
    <div class="card"><h3>Fluxo de Pedido não faturado</h3><p>Conteúdo de treinamento.</p><a href="https://drive.google.com/file/d/1rlvUskJKGGZYNfI_MWPPMNqbT1VD4YUy/view?usp=drive_link" target="_blank">Abrir Documento</a></div>
    <div class="card"><h3>Como consultar pedido na BoxLink</h3><p>Passo a passo completo.</p><a href="https://drive.google.com/file/d/1h-a69FunNE9vBG9UZVKEGKZcylwZQmee/view?usp=drive_link" target="_blank">Abrir Documento</a></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyA6WjOoM-KCi-Yl4E5rwKbOulF8tBYEClo",authDomain:"portal-atendimento-541ae.firebaseapp.com",projectId:"portal-atendimento-541ae"};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

onAuthStateChanged(auth,user=>{
  if(user && user.email.endsWith("@leveros.com.br")){
    document.getElementById("materiais-content").style.display="block";
  } else {
    // Redireciona apenas se não houver usuário logado
    window.location.href="index.html";
  }
});
</script>

</body>
</html>
