<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Materiais</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #005A64;
      text-align: center;
      margin-bottom: 30px;
    }

    .materiais-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      width: 260px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card h3 {
      margin-top: 0;
      color: #005A64;
    }

    .card p {
      font-size: 14px;
      color: #333;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #fff;
      background: #005A64;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .card a:hover {
      background: #003f46;
    }
  </style>
</head>
<body>
  <h1>Materiais</h1>
  <div class="materiais-container">

    <div class="card">
      <h3>Manual de Procedimentos</h3>
      <p>Guia rápido para consultas e processos internos.</p>
      <a href="LINK_DO_DRIVE_1" target="_blank">Abrir Documento</a>
    </div>

    <div class="card">
      <h3>Treinamento CX</h3>
      <p>Conteúdo de treinamento da equipe de atendimento.</p>
      <a href="LINK_DO_DRIVE_2" target="_blank">Abrir Documento</a>
    </div>

    <div class="card">
      <h3>Checklist de Instalação</h3>
      <p>Passo a passo completo para a equipe técnica.</p>
      <a href="LINK_DO_DRIVE_3" target="_blank">Abrir Documento</a>
    </div>

  </div>
</body>
</html>
